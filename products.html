<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>전체상품 | 세종농자재농약마트</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/products.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main class="products-page">
      <div class="inner">
        <div class="products-layout">
          <aside class="side-category" id="site-sidebar"></aside>
          <section class="products-content">
            <div class="products-page-header">
              <div class="products-breadcrumb" id="productsBreadcrumb">홈 &gt; 하우스 시설자재 &gt; 파이프 연결부속</div>
              <div class="products-title-row">
                <h2 id="categoryTitle">파이프 연결부속</h2>
                <div class="products-sort">
                  <a href="#">신상품</a><span>|</span><a href="#">상품명</a><span>|</span><a href="#">낮은가격</a><span>|</span><a href="#">높은가격</a><span>|</span><a href="#">인기상품</a><span>|</span><a href="#">사용후기</a>
                </div>
              </div>
            </div>
            <div class="subcategory-tab-box" id="subcategoryTabBox">
              <div class="subcategory-tab-title" id="subcategoryParentTitle">하우스 시설자재</div>
              <div class="subcategory-tab-list" id="subcategoryTabList"><a href="#" class="active">파이프 연결부속</a></div>
            </div>
            <div class="products-count" id="productsCount">총 0개 상품</div>
            <div class="product-grid" id="productsGrid"></div>
          </section>
        </div>
      </div>
    </main>
    <div id="site-footer"></div>
    <script src="js/site-config.js"></script>
    <script src="js/components.js"></script>
    <script src="js/common.js"></script>
    <script src="js/products.js"></script>
  </body>
</html>
